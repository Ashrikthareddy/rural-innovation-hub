version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: rural-innovation-hub:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-rural-innovation-hub}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
