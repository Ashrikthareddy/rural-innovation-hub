<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgG_lakshmi" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#880e4f"/>
    <stop offset="100%" stop-color="#3e0020"/>
  </linearGradient>
  <linearGradient id="skinG_lakshmi" x1="0.3" y1="0" x2="0.7" y2="1">
    <stop offset="0%" stop-color="#d2956a"/>
    <stop offset="100%" stop-color="#a0522d"/>
  </linearGradient>
  <linearGradient id="shirtG_lakshmi" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c2185b"/>
    <stop offset="100%" stop-color="#880e4f"/>
  </linearGradient>
  <linearGradient id="turbanG_lakshmi" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#4caf50"/>
    <stop offset="100%" stop-color="#2e7d32"/>
  </linearGradient>
  <radialGradient id="faceLight_lakshmi" cx="38%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#d2956a" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#a0522d" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="circleClip_lakshmi">
    <circle cx="100" cy="100" r="98"/>
  </clipPath>
  <filter id="soften_lakshmi"><feGaussianBlur stdDeviation="1.2"/></filter>
</defs>
<circle cx="100" cy="100" r="100" fill="url(#bgG_lakshmi)"/>
<!-- Shoulder / body -->
<ellipse cx="100" cy="196" rx="75" ry="50" fill="url(#shirtG_lakshmi)" clip-path="url(#circleClip_lakshmi)"/>
<ellipse cx="100" cy="178" rx="55" ry="22" fill="url(#shirtG_lakshmi)"/>
<!-- Neck -->
<rect x="88" y="148" width="24" height="28" rx="10" fill="url(#skinG_lakshmi)"/>
<!-- Head shape - slightly oval, natural proportions -->
<ellipse cx="100" cy="112" rx="42" ry="46" fill="url(#skinG_lakshmi)"/>
<!-- Face lighting -->
<ellipse cx="100" cy="112" rx="42" ry="46" fill="url(#faceLight_lakshmi)"/>
<!-- Ear left -->
<ellipse cx="58" cy="116" rx="8" ry="11" fill="#a0522d"/>
<ellipse cx="59" cy="116" rx="5" ry="8" fill="#d2956a" opacity="0.5"/>
<!-- Ear right -->
<ellipse cx="142" cy="116" rx="8" ry="11" fill="#a0522d"/>
<ellipse cx="141" cy="116" rx="5" ry="8" fill="#d2956a" opacity="0.5"/>
<!-- Eyebrows -->
<path d="M78,96 Q87,91 96,95" fill="none" stroke="#3d2b1f" stroke-width="2.5" stroke-linecap="round"/>
<path d="M104,95 Q113,91 122,96" fill="none" stroke="#3d2b1f" stroke-width="2.5" stroke-linecap="round"/>
<!-- Eye sockets (shadow) -->
<ellipse cx="87" cy="108" rx="11" ry="8" fill="#a0522d" opacity="0.35"/>
<ellipse cx="113" cy="108" rx="11" ry="8" fill="#a0522d" opacity="0.35"/>
<!-- Eyes: whites -->
<ellipse cx="87" cy="108" rx="9" ry="7" fill="#fff"/>
<ellipse cx="113" cy="108" rx="9" ry="7" fill="#fff"/>
<!-- Irises -->
<circle cx="87" cy="108" r="5.5" fill="#3e2723"/>
<circle cx="113" cy="108" r="5.5" fill="#3e2723"/>
<!-- Pupils -->
<circle cx="87" cy="108" r="3" fill="#1a1a1a"/>
<circle cx="113" cy="108" r="3" fill="#1a1a1a"/>
<!-- Eye catch lights -->
<circle cx="89" cy="106" r="1.5" fill="#fff"/>
<circle cx="115" cy="106" r="1.5" fill="#fff"/>
<!-- Lower eyelid shadow -->
<path d="M78,111 Q87,116 96,111" fill="none" stroke="#a0522d" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
<path d="M104,111 Q113,116 122,111" fill="none" stroke="#a0522d" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
<!-- Nose bridge shadow -->
<line x1="100" y1="100" x2="100" y2="124" stroke="#a0522d" stroke-width="1.5" opacity="0.3"/>
<!-- Nose -->
<ellipse cx="100" cy="124" rx="8" ry="6" fill="#a0522d" opacity="0.4"/>
<path d="M93,126 Q100,130 107,126" fill="none" stroke="#a0522d" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
<!-- Nostrils -->
<ellipse cx="95" cy="127" rx="3" ry="2.5" fill="#a0522d" opacity="0.55"/>
<ellipse cx="105" cy="127" rx="3" ry="2.5" fill="#a0522d" opacity="0.55"/>
<!-- Lips -->
<path d="M90,138 Q95,135 100,136 Q105,135 110,138" fill="none" stroke="#7a3e30" stroke-width="2" stroke-linecap="round"/>
<path d="M90,138 Q100,144 110,138" fill="#9e5040" stroke="none" opacity="0.55"/>
<!-- Philtrum -->
<line x1="100" y1="130" x2="100" y2="136" stroke="#a0522d" stroke-width="1.2" opacity="0.35"/>
<!-- Chin crease -->
<path d="M94,150 Q100,154 106,150" fill="none" stroke="#a0522d" stroke-width="1.2" opacity="0.3"/>
<!-- Turban/head covering -->
<ellipse cx="100" cy="73" rx="42" ry="30" fill="url(#turbanG_lakshmi)"/>
<path d="M60,82 Q65,55 100,48 Q135,55 140,82" fill="url(#turbanG_lakshmi)"/>
<path d="M60,82 Q65,58 100,50 Q135,58 140,82" fill="none" stroke="#2e7d32" stroke-width="1.5" opacity="0.4"/>
<!-- Turban fold lines -->
<path d="M67,78 Q100,62 133,78" fill="none" stroke="#2e7d32" stroke-width="1.2" opacity="0.45" stroke-linecap="round"/>
<path d="M72,68 Q100,55 128,68" fill="none" stroke="#2e7d32" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
<!-- Collar detail -->
<path d="M86,172 L100,178 L114,172" fill="none" stroke="#880e4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>